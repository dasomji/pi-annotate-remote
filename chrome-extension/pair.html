<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Pi Annotate</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #09090b;
      color: #e4e4e7;
    }
    main {
      width: min(480px, 100%);
      padding: 28px;
      border: 1px solid #27272a;
      border-radius: 14px;
      background: #18181b;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
    }
    h1 { margin: 0 0 10px; font-size: 22px; }
    p { color: #a1a1aa; line-height: 1.5; }
    .endpoint {
      padding: 12px;
      overflow-wrap: anywhere;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      background: #09090b;
      color: #c4b5fd;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
    }
    .warning { font-size: 13px; }
    #status { min-height: 21px; margin: 14px 0; font-size: 13px; }
    #status[data-state="success"] { color: #86efac; }
    #status[data-state="error"] { color: #fca5a5; }
    #status[data-state="working"] { color: #fde68a; }
    .actions { display: flex; justify-content: flex-end; gap: 8px; }
    button {
      padding: 9px 14px;
      border: 1px solid #52525b;
      border-radius: 8px;
      background: #27272a;
      color: #e4e4e7;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }
    button.primary { border-color: #818cf8; background: #6366f1; color: white; }
    button:disabled { cursor: wait; opacity: .6; }
    button[hidden] { display: none; }
  </style>
</head>
<body>
  <main>
    <h1>Connect Pi Annotate</h1>
    <p>This pairing request came from:</p>
    <div class="endpoint" id="broker-endpoint"></div>
    <p class="warning">Continue only if this is the Tailscale machine running your Pi annotation broker. Connecting replaces the broker currently configured in this browser profile.</p>
    <p id="status" role="status" aria-live="polite"></p>
    <div class="actions">
      <button id="close-btn" type="button">Close</button>
      <button class="primary" id="connect-btn" type="button">Connect</button>
    </div>
  </main>
  <script src="pair.js"></script>
</body>
</html>
